<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GM Dice Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       SIDEBAR TOGGLE BUTTON
  ════════════════════════════════════════ -->
  <button class="sidebar-toggle" id="sidebarToggle" title="Rooms">☰</button>

  <!-- ═══════════════════════════════════════
       SIDEBAR OVERLAY (click to close)
  ════════════════════════════════════════ -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <span class="sidebar-title">◈ ROOMS</span>
      <button class="sidebar-close" id="sidebarClose" title="Close">✕</button>
    </div>

    <div class="sidebar-add">
      <input
        type="text"
        id="newRoomInput"
        placeholder="new room name…"
        maxlength="30"
      />
      <button id="addRoomBtn">ADD</button>
    </div>

    <div class="room-list" id="roomList">
      <!-- Populated by index.js -->
    </div>

    <div class="sidebar-footer">
      Rooms sync in real-time via Firebase
    </div>

  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════ -->
  <main class="main">
    <div class="container">

      <!-- Sync status -->
      <div class="sync-bar" id="syncBar">
        <div class="sync-dot"></div>
        <span id="syncLabel">Connecting…</span>
      </div>

      <!-- Header -->
      <header>
        <h1>⚔ Dice Countdown ⚔</h1>
        <p>Game Master's Tracker</p>
        <div class="active-room-badge" id="activeRoomBadge">default</div>
      </header>

      <div class="ornament"><span>✦</span></div>

      <!-- Dice type selector -->
      <div class="dice-selector" id="diceSelector">
        <button class="die-btn" data-sides="2">d2</button>
        <button class="die-btn active" data-sides="4">d4</button>
        <button class="die-btn" data-sides="6">d6</button>
        <button class="die-btn" data-sides="8">d8</button>
        <button class="die-btn" data-sides="10">d10</button>
        <button class="die-btn" data-sides="12">d12</button>
        <button class="die-btn" data-sides="20">d20</button>
        <button class="die-btn" data-sides="100">d100</button>
      </div>

      <!-- Die visual -->
      <div class="die-stage">
        <svg id="die-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
              <feOffset dx="0" dy="2" result="offsetBlur"/>
              <feFlood flood-color="#000000" flood-opacity="0.6" result="color"/>
              <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
              <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <g id="die-group" filter="url(#inner-shadow)"></g>
          <text id="die-value"      x="120" y="112">4</text>
          <text id="die-goal-label" x="120" y="168">⚑ GOAL: 4</text>
        </svg>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>1</span>
          <span id="prog-center" style="color:var(--amber)">— / —</span>
          <span class="goal-label" id="prog-goal-label">⚑ —</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
          <div class="goal-notch"        id="goalNotch"></div>
        </div>
      </div>

      <!-- Goal reached banner -->
      <div class="triggered-banner" id="triggeredBanner">
        ✦ &nbsp; GOAL REACHED &nbsp; ✦
      </div>

      <!-- +/- Controls -->
      <div class="controls">
        <button class="ctrl-btn decrease" id="btnDec">−</button>
        <div class="value-badge" id="valueBadge">— / —</div>
        <button class="ctrl-btn increase" id="btnInc">+</button>
      </div>

      <div class="ornament"><span>✦</span></div>

      <!-- Set value / goal -->
      <div class="panels">
        <div class="set-row">
          <label>VALUE</label>
          <input type="number" id="startInput" value="4" min="1" />
          <button class="set-btn" id="setBtn">SET</button>
        </div>
        <div class="set-row goal-row">
          <label>⚑ GOAL</label>
          <input type="number" id="goalInput" value="4" min="1" />
          <button class="goal-btn" id="setGoalBtn">SET</button>
        </div>
      </div>

      <div class="hint" id="rangeInfo">← → arrow keys to adjust</div>

    </div>
  </main>

  <script type="module" src="index.js"></script>

</body>
</html>
